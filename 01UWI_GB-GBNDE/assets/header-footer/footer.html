<!DOCTYPE html>
<style>
    .uwgb-footer section {
        padding-left: .75rem;
        padding-right: .75rem;
    }

    .bg-light {
        background-color: #f4f5f6;
    }

    .bg-brand-1-dark {
        background-color: #0c3b33;
        color: #ffffff;
    }

    .white {
        color: #ffffff;
    }

    .h3 {
        font-size: 1.2rem;
        color: #002e3e;
        font-weight: 600;
    }

    .footer-one,
    .footer-two,
    .footer-three {
        display: flex;
        flex-direction: column;
        margin-bottom: 1.5rem;
        margin-top: 1.5rem;
        width: 100%;
    }

    .footer-one,
    .footer-three {
        justify-content: space-between;
    }

    .footer-two {
        justify-content: center;
        align-items: center;
    }

    .footer-three {
        text-align: right;
    }

    .footer-text {
        font-size: .8125rem;
        padding-bottom: .75rem;
        padding-top: .75rem;
    }

    .uwgb-footer .footer-logo {
        width: 10rem
    }

    .uwgb-footer .list-link {
        text-decoration: none;
    }

    .uwgb-footer .social-links .btn {
        border: 0.1em solid #002e3e;
        background-color: transparent;
        color: #002e3e;
        font-size: 1.5em;
        padding: 0.5rem;
    }

    .uwgb-footer .social-links .btn:hover,
    .uwgb-footer .social-links .btn:focus,
    .uwgb-footer .social-links .btn:active {
        background-color: #002e3e;
        border-color: #002e3e;
        color: #fff
    }

    @media (min-width: 768px) {
        .footer-one,
        .footer-two,
        .footer-three {
            width: 33.33333333%;
        }
    }

    @media (max-width: 767px) {
        .footer-one,
        .footer-three {
            text-align: center;
            align-items: center;
        }
    }

    @media (min-width: 1280px) {
        .uwgb-footer section {
            padding-left: 2.909rem;
            padding-right: 2.909rem;
        }
    }

    .uwgb-footer .btn {
        align-items: center;
        display: inline-flex;
        font-weight: 600;
        justify-content: center;
        padding: .5em 1.5em;
        position: relative;
        text-decoration: none;
        vertical-align: middle;
        transition: all .2s ease;
        background-color: #0f5640;
        border-color: #0f5640;
        color: #f4f5f6;
        border-radius: 4px;
    }

    .uwgb-footer .btn:hover,
    .uwgb-footer .btn:focus,
    .uwgb-footer .btn:active {
        text-decoration: none;
        background-color: #072b20;
        box-shadow: 0 5px 10px rgba(154, 160, 185, .025), 0 15px 40px rgba(166, 173, 201, .2);
        border-color: transparent;
        color: #f4f5f6
    }

    .btn.brand-3-dark {
        background-color: #002e3e;
        border-color: #002e3e;
        color: #fff
    }

    .btn.brand-3-dark:hover,
    .btn.brand-3-dark:focus,
    .btn.brand-3-dark:active {
        background-color: #00080b;
        box-shadow: 0 5px 10px rgba(154, 160, 185, .025), 0 15px 40px rgba(166, 173, 201, .2);
        border-color: transparent;
        color: #fff
    }

    .arrow-button {
        padding: .5em 2.5em
    }

    .arrow-button .arrow-button-icon {
        height: 1em;
        width: 1em;
        transition: all .3s;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        opacity: 0;
        right: 2em
    }

    .arrow-button:hover .arrow-button-icon,
    .arrow-button:active .arrow-button-icon,
    .arrow-button:focus .arrow-button-icon {
        opacity: 1;
        right: 1em
    }

    .footer-content .arrow-button {
        max-width: 250px;
    }
</style>
